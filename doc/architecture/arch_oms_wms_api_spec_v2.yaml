# ================================================================
# OMS/WMS API 명세서 (OpenAPI 3.0.3)
# ================================================================
# 작성자: 아키텍처 에이전트
# 작성일: 2026-04-10
# 버전: v2.0
#
# 목적 (Purpose):
#   OMS(Order Management System)와 WMS(Warehouse Management System)의
#   REST API 계약을 정의하여 클라이언트/서버 통신 인터페이스를 명시한다.
#
# 대상 (Audience):
#   - API 클라이언트 개발자
#   - 백엔드 API 서버 개발자
#   - QA/테스트팀: API 검증
#   - DevOps: API 모니터링
#
# 변경 이력 (Change Log):
#   - v2.0 (2026-04-10): 정책 준수 문서로 재정리
#   - v1.0 (2026-04-10): 초안 작성
# ================================================================

openapi: 3.0.3
info:
  title: WJA-18 OMS/WMS API Spec
  version: 2.0.0
  description: Detailed API specification for Phase 1 OMS, WMS and Master Data Hub integration.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
tags:
  - name: OMS
  - name: WMS
  - name: MasterData
paths:
  /v1/oms/orders:
    post:
      tags: [OMS]
      summary: Collect order
      operationId: collectOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCollectRequest'
            example:
              channel: B2B_PORTAL
              externalOrderNo: EX-20260410-1001
              orderDateTime: '2026-04-10T09:10:11Z'
              customerCode: CUST-001
              items:
                - skuCode: SKU-APPLE-01
                  qty: 10
                  uom: EA
      responses:
        '201':
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCollectResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/oms/orders/{orderId}/route:
    post:
      tags: [OMS]
      summary: Execute routing for order
      operationId: routeOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Routing done
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutingResponse'
  /v1/oms/orders/{orderId}/priority:
    post:
      tags: [OMS]
      summary: Calculate priority score
      operationId: calculatePriority
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Priority calculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriorityResponse'
  /v1/wms/receipts:
    post:
      tags: [WMS]
      summary: Confirm receipt progression
      operationId: progressReceipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiptRequest'
      responses:
        '200':
          description: Receipt state updated
  /v1/wms/shipments:
    post:
      tags: [WMS]
      summary: Progress shipment
      operationId: progressShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentRequest'
      responses:
        '200':
          description: Shipment state updated
  /v1/wms/inventory/{skuCode}:
    get:
      tags: [WMS]
      summary: Get real-time inventory
      operationId: getInventory
      parameters:
        - name: skuCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Inventory status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /v1/master-data/products:
    get:
      tags: [MasterData]
      summary: List products
      operationId: listProducts
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OrderCollectRequest:
      type: object
      required: [channel, externalOrderNo, orderDateTime, customerCode, items]
      properties:
        channel:
          type: string
          enum: [B2B_PORTAL, MARKETPLACE, EDI, MANUAL]
        externalOrderNo:
          type: string
          maxLength: 64
        orderDateTime:
          type: string
          format: date-time
        customerCode:
          type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [skuCode, qty, uom]
            properties:
              skuCode:
                type: string
              qty:
                type: integer
                minimum: 1
              uom:
                type: string
    OrderCollectResponse:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
          enum: [RECEIVED]
    RoutingResponse:
      type: object
      properties:
        orderId:
          type: string
        selectedCenters:
          type: array
          items:
            type: string
        reasonCode:
          type: string
    PriorityResponse:
      type: object
      properties:
        orderId:
          type: string
        priorityScore:
          type: number
          format: float
        priorityClass:
          type: string
          enum: [CRITICAL, HIGH, NORMAL, LOW]
    ReceiptRequest:
      type: object
      required: [centerCode, asnNo, eventType]
      properties:
        centerCode:
          type: string
        asnNo:
          type: string
        eventType:
          type: string
          enum: [ARRIVED, INSPECTED, PUTAWAY_DONE, RECEIPT_CONFIRMED]
    ShipmentRequest:
      type: object
      required: [centerCode, shipmentNo, eventType]
      properties:
        centerCode:
          type: string
        shipmentNo:
          type: string
        eventType:
          type: string
          enum: [PICKING, PACKED, SHIPPED, HANDED_OVER]
    InventoryResponse:
      type: object
      properties:
        skuCode:
          type: string
        onHand:
          type: integer
        available:
          type: integer
        allocated:
          type: integer
        inTransit:
          type: integer
        asOf:
          type: string
          format: date-time
    Product:
      type: object
      properties:
        skuCode:
          type: string
        skuName:
          type: string
        category:
          type: string
        uom:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, DEPRECATED]
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
