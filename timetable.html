<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📅 주간 시간표</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f4f8 0%, #d1ecf1 100%);
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding: 16px;
    }

    .app { max-width: 480px; margin: 0 auto; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 16px; }
    .header-title { font-size: 1.6rem; font-weight: 900; color: #1a6b8a; }
    .header-profile { font-size: 0.95rem; color: #5a8fa8; margin-top: 4px; font-weight: 700; }

    /* ── Today summary card ── */
    .today-card {
      background: #fff;
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(26, 107, 138, 0.12);
    }
    .today-card-date { font-size: 0.85rem; color: #888; font-weight: 700; margin-bottom: 8px; }
    .today-card-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .today-card-stat { display: flex; flex-direction: column; align-items: center; }
    .today-card-stat-num { font-size: 1.4rem; font-weight: 900; color: #1a6b8a; }
    .today-card-stat-label { font-size: 0.72rem; color: #999; font-weight: 700; }
    .today-card-next { flex: 1; min-width: 120px; }
    .today-card-next-label { font-size: 0.72rem; color: #999; font-weight: 700; }
    .today-card-next-subject { font-size: 1.1rem; font-weight: 900; color: #1a6b8a; margin-top: 2px; }
    .today-card-next-countdown { font-size: 0.82rem; color: #e67e22; font-weight: 700; margin-top: 2px; }

    /* ── Grid ── */
    .grid-wrap {
      background: #fff;
      border-radius: 20px;
      padding: 12px 6px;
      box-shadow: 0 4px 20px rgba(26, 107, 138, 0.12);
      overflow-x: auto;
    }

    .grid-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 3px;
    }

    .grid-header-cell {
      text-align: center;
      font-size: 0.82rem;
      font-weight: 900;
      color: #aaa;
      padding: 4px 2px 6px;
    }
    .grid-header-cell.today-col { color: #1a6b8a; font-size: 0.88rem; }

    .today-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #1a6b8a;
      margin-left: 2px;
      vertical-align: middle;
    }

    .period-label-cell {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 800;
      color: #ccc;
      padding: 2px 2px;
      width: 22px;
      vertical-align: middle;
    }

    /* ── Subject cell ── */
    .subject-cell {
      height: 50px;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s;
      vertical-align: middle;
      padding: 2px;
    }
    .subject-cell:active { transform: scale(0.94); }
    .subject-cell.empty-cell { cursor: default; }

    .cell-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      border-radius: 8px;
    }
    .cell-name {
      font-size: 0.7rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.25;
      word-break: keep-all;
      padding: 2px;
    }

    /* ── Today column highlight ── */
    .subject-cell.today-col .cell-inner {
      box-shadow: inset 0 0 0 2px rgba(26, 107, 138, 0.25);
    }

    /* ── Pulse animation for current period (FR-020) ── */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0   rgba(255, 120, 50, 0.65); }
      70%  { box-shadow: 0 0 0 8px rgba(255, 120, 50, 0);    }
      100% { box-shadow: 0 0 0 0   rgba(255, 120, 50, 0);    }
    }
    .current-period {
      animation: pulse-ring 1.8s ease-out infinite;
    }
    .current-period .cell-inner {
      outline: 2.5px solid #ff7832;
      outline-offset: -1px;
    }
    .current-badge {
      position: absolute;
      top: -5px; right: -2px;
      background: #ff7832;
      color: #fff;
      font-size: 0.52rem;
      font-weight: 900;
      border-radius: 5px;
      padding: 1px 4px;
      z-index: 2;
    }

    /* ── Bottom sheet (FR-021) ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.38);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .sheet {
      background: #fff;
      border-radius: 28px 28px 0 0;
      padding: 20px 24px 40px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .sheet-handle {
      width: 48px; height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .sheet-subject-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .sheet-color-dot { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }
    .sheet-subject-name { font-size: 1.3rem; font-weight: 900; color: #1a1a2e; }
    .sheet-period-info { font-size: 0.82rem; color: #888; margin-top: 3px; font-weight: 700; }

    .sheet-section-title {
      font-size: 0.76rem;
      font-weight: 900;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .sheet-teacher-row {
      background: #f8f8f8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 16px;
    }

    .supplies-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .supply-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8f8f8;
      border-radius: 10px;
      padding: 9px 14px;
    }
    .supply-name { font-size: 0.9rem; font-weight: 700; color: #333; }
    .supplies-empty { font-size: 0.85rem; color: #ccc; font-style: italic; }

    .sheet-close-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: #1a6b8a;
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      min-height: 52px;
      transition: transform 0.1s;
    }
    .sheet-close-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── Constants ───────────────────────────────────────────────────────────
    const STORAGE_KEY = 'timetable_v1';
    const DAYS = ['월', '화', '수', '목', '금'];

    // Korean elementary school standard class schedule
    const PERIOD_TIMES = [
      { start: '09:00', end: '09:40' },
      { start: '09:50', end: '10:30' },
      { start: '10:40', end: '11:20' },
      { start: '11:30', end: '12:10' },
      { start: '13:00', end: '13:40' },
      { start: '13:50', end: '14:30' },
      { start: '14:40', end: '15:20' },
    ];

    // 12-color palette (FR-015)
    const PALETTE = [
      '#FF8C8C', '#FFB347', '#FFD966', '#90EE90',
      '#87CEEB', '#DDA0DD', '#98D8D8', '#FFB6C1',
      '#F0A070', '#A8D8A8', '#B0C4DE', '#E8B4B8',
    ];

    // ─── Default demo data ────────────────────────────────────────────────────
    function getDefaultData() {
      const subjects = [
        { id: 's1',  name: '국어',  colorHex: '#FF8C8C', teacherName: '김선생님', supplies: ['국어책', '받아쓰기 공책'] },
        { id: 's2',  name: '수학',  colorHex: '#FFB347', teacherName: '이선생님', supplies: ['수학책', '연산 노트', '자'] },
        { id: 's3',  name: '영어',  colorHex: '#87CEEB', teacherName: '박선생님', supplies: ['영어책', '단어장'] },
        { id: 's4',  name: '사회',  colorHex: '#90EE90', teacherName: '',         supplies: ['사회책', '지도'] },
        { id: 's5',  name: '과학',  colorHex: '#DDA0DD', teacherName: '최선생님', supplies: ['과학책', '실험 관찰'] },
        { id: 's6',  name: '체육',  colorHex: '#98D8D8', teacherName: '',         supplies: ['체육복', '운동화'] },
        { id: 's7',  name: '미술',  colorHex: '#FFD966', teacherName: '',         supplies: ['스케치북', '물감', '붓'] },
        { id: 's8',  name: '음악',  colorHex: '#FFB6C1', teacherName: '',         supplies: ['음악책', '리코더'] },
        { id: 's9',  name: '도덕',  colorHex: '#F0A070', teacherName: '',         supplies: ['도덕책'] },
        { id: 's10', name: '실과',  colorHex: '#A8D8A8', teacherName: '',         supplies: ['실과책'] },
      ];

      // dayOfWeek: 1=Mon … 5=Fri; period: 1-7; subjectId: null = empty slot
      const slots = [
        { dayOfWeek: 1, period: 1, subjectId: 's1'  },
        { dayOfWeek: 1, period: 2, subjectId: 's2'  },
        { dayOfWeek: 1, period: 3, subjectId: 's3'  },
        { dayOfWeek: 1, period: 4, subjectId: 's4'  },
        { dayOfWeek: 1, period: 5, subjectId: 's5'  },
        { dayOfWeek: 1, period: 6, subjectId: 's6'  },

        { dayOfWeek: 2, period: 1, subjectId: 's2'  },
        { dayOfWeek: 2, period: 2, subjectId: 's1'  },
        { dayOfWeek: 2, period: 3, subjectId: 's5'  },
        { dayOfWeek: 2, period: 4, subjectId: 's7'  },
        { dayOfWeek: 2, period: 5, subjectId: 's3'  },
        { dayOfWeek: 2, period: 6, subjectId: 's9'  },
        { dayOfWeek: 2, period: 7, subjectId: 's8'  },

        { dayOfWeek: 3, period: 1, subjectId: 's4'  },
        { dayOfWeek: 3, period: 2, subjectId: 's2'  },
        { dayOfWeek: 3, period: 3, subjectId: 's1'  },
        { dayOfWeek: 3, period: 4, subjectId: 's3'  },
        { dayOfWeek: 3, period: 5, subjectId: 's6'  },
        { dayOfWeek: 3, period: 6, subjectId: 's2'  },

        { dayOfWeek: 4, period: 1, subjectId: 's3'  },
        { dayOfWeek: 4, period: 2, subjectId: 's1'  },
        { dayOfWeek: 4, period: 3, subjectId: 's4'  },
        { dayOfWeek: 4, period: 4, subjectId: 's5'  },
        { dayOfWeek: 4, period: 5, subjectId: 's10' },
        { dayOfWeek: 4, period: 6, subjectId: 's1'  },
        { dayOfWeek: 4, period: 7, subjectId: 's8'  },

        { dayOfWeek: 5, period: 1, subjectId: 's1'  },
        { dayOfWeek: 5, period: 2, subjectId: 's5'  },
        { dayOfWeek: 5, period: 3, subjectId: 's2'  },
        { dayOfWeek: 5, period: 4, subjectId: 's7'  },
        { dayOfWeek: 5, period: 5, subjectId: 's9'  },
        { dayOfWeek: 5, period: 6, subjectId: 's3'  },
      ];

      return { subjects, slots, profile: { grade: 3, classNo: 2 } };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : getDefaultData();
      } catch { return getDefaultData(); }
    }

    // ─── Time utilities ───────────────────────────────────────────────────────
    function toMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + m;
    }

    function nowMinutes() {
      const n = new Date();
      return n.getHours() * 60 + n.getMinutes();
    }

    // Returns 1-based period index currently in progress, or null
    function getCurrentPeriod() {
      const cur = nowMinutes();
      for (let i = 0; i < PERIOD_TIMES.length; i++) {
        if (cur >= toMinutes(PERIOD_TIMES[i].start) && cur <= toMinutes(PERIOD_TIMES[i].end)) {
          return i + 1;
        }
      }
      return null;
    }

    // Returns JS day-of-week mapped to 1=Mon…5=Fri, or null for weekends
    function getTodayDow() {
      const d = new Date().getDay();
      return d >= 1 && d <= 5 ? d : null;
    }

    function getTodayStats(dow, slots) {
      if (!dow) return { total: 0, remaining: 0 };
      const cur = nowMinutes();
      const todaySlots = slots.filter(s => s.dayOfWeek === dow && s.subjectId);
      const remaining = todaySlots.filter(s => toMinutes(PERIOD_TIMES[s.period - 1]?.end ?? '00:00') > cur).length;
      return { total: todaySlots.length, remaining };
    }

    function getNextPeriodInfo(dow, slots, subjects) {
      if (!dow) return null;
      const cur = nowMinutes();
      for (let i = 0; i < PERIOD_TIMES.length; i++) {
        const startMin = toMinutes(PERIOD_TIMES[i].start);
        if (startMin > cur) {
          const slot = slots.find(s => s.dayOfWeek === dow && s.period === i + 1 && s.subjectId);
          if (slot) {
            const subject = subjects.find(s => s.id === slot.subjectId);
            if (subject) return { subject, period: i + 1, minsLeft: startMin - cur };
          }
        }
      }
      return null;
    }

    function getCurrentSubject(dow, slots, subjects) {
      const p = getCurrentPeriod();
      if (!dow || !p) return null;
      const slot = slots.find(s => s.dayOfWeek === dow && s.period === p && s.subjectId);
      return slot ? subjects.find(s => s.id === slot.subjectId) ?? null : null;
    }

    function isLightColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 155;
    }

    function formatDate() {
      const d = new Date();
      const dow = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${dow})`;
    }

    // ─── Components ───────────────────────────────────────────────────────────

    function TodayCard({ dow, slots, subjects }) {
      const [, tick] = useState(0);
      useEffect(() => {
        const id = setInterval(() => tick(t => t + 1), 30_000);
        return () => clearInterval(id);
      }, []);

      const stats       = getTodayStats(dow, slots);
      const curSubject  = getCurrentSubject(dow, slots, subjects);
      const nextInfo    = getNextPeriodInfo(dow, slots, subjects);
      const curPeriod   = getCurrentPeriod();

      return (
        <div className="today-card">
          <div className="today-card-date">{formatDate()}</div>
          <div className="today-card-row">
            <div className="today-card-stat">
              <span className="today-card-stat-num">{stats.total}</span>
              <span className="today-card-stat-label">전체 교시</span>
            </div>
            <div className="today-card-stat">
              <span className="today-card-stat-num">{stats.remaining}</span>
              <span className="today-card-stat-label">남은 교시</span>
            </div>
            <div className="today-card-next">
              {curSubject ? (
                <>
                  <div className="today-card-next-label">지금 수업</div>
                  <div className="today-card-next-subject" style={{ color: curSubject.colorHex }}>
                    {curSubject.name}
                  </div>
                  <div className="today-card-next-countdown">{curPeriod}교시 진행 중</div>
                </>
              ) : nextInfo ? (
                <>
                  <div className="today-card-next-label">다음 수업</div>
                  <div className="today-card-next-subject">{nextInfo.subject.name}</div>
                  <div className="today-card-next-countdown">{nextInfo.minsLeft}분 후</div>
                </>
              ) : (
                <>
                  <div className="today-card-next-label">오늘 수업</div>
                  <div className="today-card-next-subject" style={{ color: '#aaa' }}>
                    {dow ? '모두 완료! 🎉' : '주말이에요 😊'}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function SubjectCell({ dayOfWeek, period, subject, isToday, isCurrentPeriod, onClick }) {
      const bgColor  = subject ? subject.colorHex : (isToday ? '#eef7fb' : '#f5f5f5');
      const txtColor = subject ? (isLightColor(subject.colorHex) ? '#333' : '#fff') : '#ccc';

      function handleClick() {
        if (subject) onClick({ dayOfWeek, period }, subject);
      }

      return (
        <td>
          <div
            className={[
              'subject-cell',
              !subject ? 'empty-cell' : '',
              isToday   ? 'today-col' : '',
              isCurrentPeriod ? 'current-period' : '',
            ].filter(Boolean).join(' ')}
            onClick={handleClick}
            role={subject ? 'button' : undefined}
            tabIndex={subject ? 0 : undefined}
            aria-label={subject ? `${subject.name} ${period}교시` : undefined}
            onKeyDown={subject ? (e => e.key === 'Enter' && handleClick()) : undefined}
          >
            {isCurrentPeriod && <span className="current-badge" aria-label="현재 수업">지금</span>}
            <div className="cell-inner" style={{ background: bgColor }}>
              {subject && (
                <span className="cell-name" style={{ color: txtColor }}>{subject.name}</span>
              )}
            </div>
          </div>
        </td>
      );
    }

    function DetailSheet({ slot, subject, onClose }) {
      return (
        <div
          className="sheet-overlay"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
          aria-label={`${subject.name} 상세 정보`}
        >
          <div className="sheet" onClick={e => e.stopPropagation()}>
            <div className="sheet-handle" />

            <div className="sheet-subject-row">
              <div className="sheet-color-dot" style={{ background: subject.colorHex }} />
              <div>
                <div className="sheet-subject-name">{subject.name}</div>
                <div className="sheet-period-info">
                  {DAYS[slot.dayOfWeek - 1]}요일 {slot.period}교시
                  &nbsp;({PERIOD_TIMES[slot.period - 1].start}~{PERIOD_TIMES[slot.period - 1].end})
                </div>
              </div>
            </div>

            {subject.teacherName && (
              <>
                <div className="sheet-section-title">담당 선생님</div>
                <div className="sheet-teacher-row">👩‍🏫 {subject.teacherName}</div>
              </>
            )}

            <div className="sheet-section-title">준비물</div>
            {subject.supplies && subject.supplies.length > 0 ? (
              <ul className="supplies-list" aria-label="준비물 목록">
                {subject.supplies.map((item, i) => (
                  <li key={i} className="supply-item">
                    <span aria-hidden="true">📦</span>
                    <span className="supply-name">{item}</span>
                  </li>
                ))}
              </ul>
            ) : (
              <div className="supplies-empty">등록된 준비물이 없어요</div>
            )}

            <button className="sheet-close-btn" onClick={onClose}>닫기</button>
          </div>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [data]         = useState(() => loadData());
      const [selected, setSelected] = useState(null); // { slot, subject }
      const [curPeriod, setCurPeriod] = useState(() => getCurrentPeriod());
      const todayDow = getTodayDow();

      useEffect(() => {
        const id = setInterval(() => setCurPeriod(getCurrentPeriod()), 30_000);
        return () => clearInterval(id);
      }, []);

      const { subjects, slots, profile } = data;

      function getSubjectForSlot(dow, period) {
        const slot = slots.find(s => s.dayOfWeek === dow && s.period === period);
        if (!slot || !slot.subjectId) return null;
        return subjects.find(s => s.id === slot.subjectId) ?? null;
      }

      return (
        <div className="app">
          <div className="header">
            <div className="header-title">📅 주간 시간표</div>
            <div className="header-profile">{profile.grade}학년 {profile.classNo}반</div>
          </div>

          <TodayCard dow={todayDow} slots={slots} subjects={subjects} />

          {/* Weekly grid (FR-019) */}
          <div className="grid-wrap">
            <table className="grid-table" aria-label="주간 시간표 그리드">
              <thead>
                <tr>
                  <th className="grid-header-cell" />
                  {DAYS.map((day, i) => {
                    const dow = i + 1;
                    const isToday = dow === todayDow;
                    return (
                      <th
                        key={dow}
                        scope="col"
                        className={`grid-header-cell${isToday ? ' today-col' : ''}`}
                        aria-label={`${day}요일${isToday ? ' (오늘)' : ''}`}
                      >
                        {day}
                        {isToday && <span className="today-dot" aria-hidden="true" />}
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {[1, 2, 3, 4, 5, 6, 7].map(period => (
                  <tr key={period}>
                    <td className="period-label-cell" aria-label={`${period}교시`}>{period}</td>
                    {[1, 2, 3, 4, 5].map(dow => {
                      const subject = getSubjectForSlot(dow, period);
                      return (
                        <SubjectCell
                          key={dow}
                          dayOfWeek={dow}
                          period={period}
                          subject={subject}
                          isToday={dow === todayDow}
                          isCurrentPeriod={dow === todayDow && curPeriod === period}
                          onClick={(slot, sub) => setSelected({ slot, sub })}
                        />
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Detail bottom sheet (FR-021) */}
          {selected && (
            <DetailSheet
              slot={selected.slot}
              subject={selected.sub}
              onClose={() => setSelected(null)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
