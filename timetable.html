<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📅 초등학생 시간표</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
      padding: 20px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 900;
      color: #0369a1;
      letter-spacing: -0.02em;
    }
    .header .sub {
      font-size: 0.9rem;
      color: #0284c7;
      margin-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(3, 105, 161, 0.12);
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0369a1;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Onboarding ── */
    .onboarding-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 320px;
      margin: 0 auto;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-group select, .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #bae6fd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group select:focus, .form-group input:focus {
      border-color: #0284c7;
    }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #0284c7;
      color: white;
      box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
    }
    .btn-primary:hover { background: #0369a1; }
    .btn-secondary {
      background: #e0f2fe;
      color: #0369a1;
    }
    .btn-secondary:hover { background: #bae6fd; }
    .btn-danger {
      background: #fee2e2;
      color: #dc2626;
    }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 7px;
    }

    /* ── Today Summary Card ── */
    .today-card {
      background: linear-gradient(135deg, #0369a1, #0284c7);
      color: white;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .today-card .date-label {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-bottom: 4px;
    }
    .today-card .today-title {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 12px;
    }
    .today-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .today-stat {
      display: flex;
      flex-direction: column;
    }
    .today-stat .stat-val {
      font-size: 1.5rem;
      font-weight: 900;
    }
    .today-stat .stat-label {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    .next-class {
      margin-top: 12px;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 12px;
    }

    /* ── Weekly Grid ── */
    .grid-scroll {
      overflow-x: auto;
    }
    .timetable-grid {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
    }
    .timetable-grid th {
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 700;
      padding: 10px 8px;
      font-size: 0.85rem;
      text-align: center;
      border: 1px solid #bae6fd;
    }
    .timetable-grid td {
      border: 1px solid #e0f2fe;
      padding: 6px 4px;
      text-align: center;
      vertical-align: middle;
      min-height: 44px;
      min-width: 60px;
    }
    .timetable-grid .period-cell {
      background: #f0f9ff;
      font-weight: 700;
      font-size: 0.8rem;
      color: #0369a1;
      white-space: nowrap;
    }
    .subject-cell {
      border-radius: 8px;
      padding: 6px 4px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .subject-cell:hover { opacity: 0.85; transform: scale(1.04); }
    .subject-cell.empty {
      background: #f8fafc;
      color: #94a3b8;
      font-size: 0.75rem;
      border: 1.5px dashed #cbd5e1;
    }

    /* ── Subject list ── */
    .subject-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .subject-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .subject-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Form row ── */
    .form-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .form-row .form-group { margin-bottom: 0; flex: 1; min-width: 100px; }
    .input-sm {
      padding: 8px 10px;
      border: 2px solid #bae6fd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .input-sm:focus { border-color: #0284c7; }

    /* ── Supply list ── */
    .supply-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f9ff;
    }
    .supply-item:last-child { border-bottom: none; }
    .supply-check {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #0284c7;
    }
    .supply-name { flex: 1; font-size: 0.9rem; color: #374151; }
    .supply-name.checked { text-decoration: line-through; color: #94a3b8; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: #0369a1;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* ── Profile badge ── */
    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e0f2fe;
      color: #0369a1;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* ── Nav tabs ── */
    .nav-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
      padding: 4px;
    }
    .nav-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      border-radius: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #64748b;
      transition: background 0.15s, color 0.15s;
    }
    .nav-tab.active {
      background: white;
      color: #0369a1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ── Color palette ── */
    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #0369a1; transform: scale(1.1); }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ─────────────────────────────────────────────────────────────
//  Local Storage Service  (POMO-18: 외부 서버 없이 기기 로컬 저장)
// ─────────────────────────────────────────────────────────────
const STORAGE_KEYS = {
  PROFILE:  'tt_profile',
  SUBJECTS: 'tt_subjects',
  SLOTS:    'tt_slots',
  SUPPLIES: 'tt_supplies',
  SETTINGS: 'tt_settings',
};

function load(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}

function save(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ─────────────────────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────────────────────
const DAYS = ['월', '화', '수', '목', '금'];
const PERIODS = [1, 2, 3, 4, 5, 6, 7];
const GRADES = [1, 2, 3, 4, 5, 6];
const CLASSES = Array.from({ length: 15 }, (_, i) => i + 1);
const TODAY_IDX = Math.min(new Date().getDay() - 1, 4); // 0=월 ~ 4=금; 주말이면 4(금)

const PALETTE = [
  '#ef4444', '#f97316', '#f59e0b', '#84cc16',
  '#22c55e', '#14b8a6', '#3b82f6', '#8b5cf6',
  '#ec4899', '#64748b', '#0ea5e9', '#a78bfa',
];

// ─────────────────────────────────────────────────────────────
//  Hooks
// ─────────────────────────────────────────────────────────────
function useLocalState(key, init) {
  const [state, setState] = useState(() => load(key, init));
  const set = useCallback((val) => {
    setState(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      save(key, next);
      return next;
    });
  }, [key]);
  return [state, set];
}

// ─────────────────────────────────────────────────────────────
//  Sub-components
// ─────────────────────────────────────────────────────────────

function ColorPalette({ selected, onSelect }) {
  return (
    <div className="color-palette">
      {PALETTE.map(c => (
        <div
          key={c}
          className={`color-swatch${selected === c ? ' selected' : ''}`}
          style={{ background: c }}
          onClick={() => onSelect(c)}
        />
      ))}
    </div>
  );
}

function SlotModal({ slot, subjects, onClose, onSave }) {
  const [subjectId, setSubjectId] = useState(slot.subjectId || '');
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-title">
          {DAYS[slot.day - 1]}요일 {slot.period}교시 설정
        </div>
        <div className="form-group" style={{ marginBottom: 12 }}>
          <label>과목 선택</label>
          <select
            className="input-sm"
            value={subjectId}
            onChange={e => setSubjectId(e.target.value)}
          >
            <option value="">— 비움 —</option>
            {subjects.map(s => (
              <option key={s.id} value={s.id}>{s.name}</option>
            ))}
          </select>
        </div>
        <div className="modal-actions">
          <button className="btn btn-secondary btn-sm" onClick={onClose}>취소</button>
          <button
            className="btn btn-primary btn-sm"
            onClick={() => onSave({ ...slot, subjectId: subjectId || null })}
          >
            저장
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  Screens
// ─────────────────────────────────────────────────────────────

function OnboardingScreen({ onComplete }) {
  const [grade, setGrade] = useState(3);
  const [classNo, setClassNo] = useState(1);
  return (
    <div className="card" style={{ maxWidth: 400, margin: '40px auto' }}>
      <div className="card-title">📚 시작하기</div>
      <p style={{ fontSize: '0.9rem', color: '#64748b', marginBottom: 20 }}>
        학년과 반을 선택하면 시간표를 만들 수 있어요!
      </p>
      <div className="onboarding-form">
        <div className="form-group">
          <label>학년</label>
          <select value={grade} onChange={e => setGrade(Number(e.target.value))}>
            {GRADES.map(g => <option key={g} value={g}>{g}학년</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>반</label>
          <select value={classNo} onChange={e => setClassNo(Number(e.target.value))}>
            {CLASSES.map(c => <option key={c} value={c}>{c}반</option>)}
          </select>
        </div>
        <button
          className="btn btn-primary"
          onClick={() => onComplete({ id: uid(), grade, classNo, createdAt: new Date().toISOString() })}
        >
          시간표 만들기 →
        </button>
      </div>
    </div>
  );
}

function HomeTab({ profile, subjects, slots, supplies }) {
  const today = new Date();
  const dayStr = ['일','월','화','수','목','금','토'][today.getDay()];
  const isWeekday = today.getDay() >= 1 && today.getDay() <= 5;
  const todaySlots = isWeekday
    ? slots.filter(s => s.day === TODAY_IDX + 1).sort((a, b) => a.period - b.period)
    : [];
  const filled = todaySlots.filter(s => s.subjectId);
  const currentHour = today.getHours();
  // rough period estimate: period 1 starts 09:00, each ~45 min
  const currentPeriod = Math.max(1, Math.min(7, Math.floor((currentHour - 9) * 60 / 45) + 1));
  const remaining = filled.filter(s => s.period >= currentPeriod).length;
  const nextSlot = filled.find(s => s.period >= currentPeriod);
  const nextSubject = nextSlot ? subjects.find(s => s.id === nextSlot.subjectId) : null;

  // today's supplies
  const subjectIds = new Set(filled.map(s => s.subjectId));
  const todaySupplies = supplies.filter(s => subjectIds.has(s.subjectId));
  const unchecked = todaySupplies.filter(s => s.checkedDate !== today.toDateString());

  return (
    <>
      <div className="today-card">
        <div className="date-label">{today.getFullYear()}년 {today.getMonth()+1}월 {today.getDate()}일 ({dayStr}요일)</div>
        <div className="today-title">
          {profile.grade}학년 {profile.classNo}반 오늘의 수업
        </div>
        {isWeekday ? (
          <>
            <div className="today-stats">
              <div className="today-stat">
                <span className="stat-val">{filled.length}</span>
                <span className="stat-label">전체 교시</span>
              </div>
              <div className="today-stat">
                <span className="stat-val">{remaining}</span>
                <span className="stat-label">남은 교시</span>
              </div>
              <div className="today-stat">
                <span className="stat-val">{unchecked.length}</span>
                <span className="stat-label">준비물 남음</span>
              </div>
            </div>
            {nextSubject && (
              <div className="next-class">
                📖 다음 수업: <strong>{nextSubject.name}</strong> ({nextSlot.period}교시)
              </div>
            )}
          </>
        ) : (
          <div style={{ opacity: 0.85 }}>오늘은 주말이에요. 푹 쉬세요! 🎉</div>
        )}
      </div>
    </>
  );
}

function ScheduleTab({ subjects, slots, setSlots }) {
  const [modal, setModal] = useState(null);

  const getSlot = (day, period) =>
    slots.find(s => s.day === day && s.period === period) || { day, period, subjectId: null };

  const handleCellClick = (day, period) => {
    setModal(getSlot(day, period));
  };

  const handleSave = (updated) => {
    setSlots(prev => {
      const without = prev.filter(s => !(s.day === updated.day && s.period === updated.period));
      return updated.subjectId ? [...without, updated] : without;
    });
    setModal(null);
  };

  const subjectMap = Object.fromEntries(subjects.map(s => [s.id, s]));

  return (
    <>
      <div className="card-title">📅 주간 시간표</div>
      <p style={{ fontSize: '0.82rem', color: '#64748b', marginBottom: 12 }}>
        셀을 탭해서 과목을 등록하세요
      </p>
      <div className="grid-scroll">
        <table className="timetable-grid">
          <thead>
            <tr>
              <th>교시</th>
              {DAYS.map(d => <th key={d}>{d}</th>)}
            </tr>
          </thead>
          <tbody>
            {PERIODS.map(period => (
              <tr key={period}>
                <td className="period-cell">{period}교시</td>
                {DAYS.map((_, di) => {
                  const day = di + 1;
                  const slot = slots.find(s => s.day === day && s.period === period);
                  const subject = slot?.subjectId ? subjectMap[slot.subjectId] : null;
                  return (
                    <td key={day} onClick={() => handleCellClick(day, period)}>
                      <div
                        className={`subject-cell${subject ? '' : ' empty'}`}
                        style={subject ? {
                          background: subject.color + '33',
                          color: subject.color,
                        } : {}}
                      >
                        {subject ? subject.name : '+'}
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <SlotModal
          slot={modal}
          subjects={subjects}
          onClose={() => setModal(null)}
          onSave={handleSave}
        />
      )}
    </>
  );
}

function SubjectsTab({ subjects, setSubjects, supplies, setSupplies }) {
  const [name, setName] = useState('');
  const [color, setColor] = useState(PALETTE[0]);
  const [teacher, setTeacher] = useState('');
  const [expanded, setExpanded] = useState(null);
  const [supplyInput, setSupplyInput] = useState('');

  const addSubject = () => {
    const trimmed = name.trim().slice(0, 10);
    if (!trimmed) return;
    setSubjects(prev => [...prev, { id: uid(), name: trimmed, color, teacherName: teacher.trim() || null }]);
    setName('');
    setTeacher('');
  };

  const removeSubject = (id) => {
    setSubjects(prev => prev.filter(s => s.id !== id));
    setSupplies(prev => prev.filter(s => s.subjectId !== id));
  };

  const addSupply = (subjectId) => {
    const trimmed = supplyInput.trim();
    if (!trimmed) return;
    const existing = supplies.filter(s => s.subjectId === subjectId);
    if (existing.length >= 10) return;
    setSupplies(prev => [...prev, { id: uid(), subjectId, name: trimmed, checkedDate: null }]);
    setSupplyInput('');
  };

  const removeSupply = (id) => {
    setSupplies(prev => prev.filter(s => s.id !== id));
  };

  const toggleSupply = (id) => {
    const today = new Date().toDateString();
    setSupplies(prev => prev.map(s =>
      s.id === id ? { ...s, checkedDate: s.checkedDate === today ? null : today } : s
    ));
  };

  return (
    <>
      <div className="card-title">✏️ 과목 관리</div>

      {/* Add form */}
      <div style={{ marginBottom: 20, padding: '16px', background: '#f0f9ff', borderRadius: 12 }}>
        <div className="form-row">
          <div className="form-group">
            <label style={{ fontSize: '0.8rem', fontWeight: 600, color: '#374151', display: 'block', marginBottom: 4 }}>
              과목명 (최대 10자)
            </label>
            <input
              className="input-sm"
              placeholder="예: 수학"
              value={name}
              maxLength={10}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addSubject()}
            />
          </div>
          <div className="form-group">
            <label style={{ fontSize: '0.8rem', fontWeight: 600, color: '#374151', display: 'block', marginBottom: 4 }}>
              담당 선생님 (선택)
            </label>
            <input
              className="input-sm"
              placeholder="예: 김선생님"
              value={teacher}
              onChange={e => setTeacher(e.target.value)}
            />
          </div>
        </div>
        <div style={{ marginBottom: 8 }}>
          <label style={{ fontSize: '0.8rem', fontWeight: 600, color: '#374151', display: 'block', marginBottom: 6 }}>
            대표 색상
          </label>
          <ColorPalette selected={color} onSelect={setColor} />
        </div>
        <button className="btn btn-primary btn-sm" onClick={addSubject} disabled={!name.trim()}>
          + 과목 추가
        </button>
      </div>

      {/* Subject list */}
      {subjects.length === 0 ? (
        <div className="empty-state">
          <div className="icon">📚</div>
          과목을 추가해보세요!
        </div>
      ) : (
        <div className="subject-list" style={{ flexDirection: 'column', gap: 10 }}>
          {subjects.map(s => {
            const subs = supplies.filter(sp => sp.subjectId === s.id);
            const today = new Date().toDateString();
            const isOpen = expanded === s.id;
            return (
              <div key={s.id} style={{ border: `2px solid ${s.color}33`, borderRadius: 12, overflow: 'hidden' }}>
                <div
                  style={{
                    display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px',
                    background: s.color + '18', cursor: 'pointer',
                  }}
                  onClick={() => setExpanded(isOpen ? null : s.id)}
                >
                  <div className="subject-dot" style={{ background: s.color }} />
                  <span style={{ flex: 1, fontWeight: 700, fontSize: '0.95rem', color: '#1e293b' }}>
                    {s.name}
                  </span>
                  {s.teacherName && (
                    <span style={{ fontSize: '0.78rem', color: '#64748b' }}>{s.teacherName}</span>
                  )}
                  <span style={{ fontSize: '0.78rem', color: '#0284c7' }}>
                    준비물 {subs.length}/10
                  </span>
                  <button
                    className="btn btn-danger btn-sm"
                    style={{ padding: '4px 8px' }}
                    onClick={e => { e.stopPropagation(); removeSubject(s.id); }}
                  >
                    삭제
                  </button>
                  <span style={{ color: '#94a3b8' }}>{isOpen ? '▲' : '▼'}</span>
                </div>

                {isOpen && (
                  <div style={{ padding: '12px 14px', background: 'white' }}>
                    {subs.map(sp => (
                      <div key={sp.id} className="supply-item">
                        <input
                          type="checkbox"
                          className="supply-check"
                          checked={sp.checkedDate === today}
                          onChange={() => toggleSupply(sp.id)}
                        />
                        <span className={`supply-name${sp.checkedDate === today ? ' checked' : ''}`}>
                          {sp.name}
                        </span>
                        <button
                          className="btn btn-danger btn-sm"
                          style={{ padding: '2px 7px', fontSize: '0.75rem' }}
                          onClick={() => removeSupply(sp.id)}
                        >
                          ✕
                        </button>
                      </div>
                    ))}
                    {subs.length < 10 && (
                      <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                        <input
                          className="input-sm"
                          placeholder="준비물 추가 (예: 색연필)"
                          style={{ flex: 1 }}
                          value={supplyInput}
                          onChange={e => setSupplyInput(e.target.value)}
                          onKeyDown={e => e.key === 'Enter' && addSupply(s.id)}
                        />
                        <button
                          className="btn btn-primary btn-sm"
                          onClick={() => addSupply(s.id)}
                        >
                          추가
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

function SettingsTab({ profile, setProfile }) {
  const [editing, setEditing] = useState(false);
  const [grade, setGrade] = useState(profile.grade);
  const [classNo, setClassNo] = useState(profile.classNo);

  const save = () => {
    setProfile(prev => ({ ...prev, grade, classNo }));
    setEditing(false);
  };

  const resetAll = () => {
    if (!window.confirm('모든 데이터를 삭제할까요? 이 작업은 되돌릴 수 없어요.')) return;
    Object.values(STORAGE_KEYS).forEach(k => localStorage.removeItem(k));
    window.location.reload();
  };

  return (
    <>
      <div className="card-title">⚙️ 설정</div>

      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: '0.85rem', color: '#64748b', marginBottom: 8 }}>현재 프로필</div>
        <div className="profile-badge">
          🎒 {profile.grade}학년 {profile.classNo}반
        </div>
      </div>

      {editing ? (
        <div style={{ background: '#f0f9ff', borderRadius: 12, padding: 16, marginBottom: 16 }}>
          <div className="form-row">
            <div className="form-group">
              <label style={{ fontSize: '0.8rem', fontWeight: 600, color: '#374151', display: 'block', marginBottom: 4 }}>학년</label>
              <select className="input-sm" value={grade} onChange={e => setGrade(Number(e.target.value))}>
                {GRADES.map(g => <option key={g} value={g}>{g}학년</option>)}
              </select>
            </div>
            <div className="form-group">
              <label style={{ fontSize: '0.8rem', fontWeight: 600, color: '#374151', display: 'block', marginBottom: 4 }}>반</label>
              <select className="input-sm" value={classNo} onChange={e => setClassNo(Number(e.target.value))}>
                {CLASSES.map(c => <option key={c} value={c}>{c}반</option>)}
              </select>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="btn btn-primary btn-sm" onClick={save}>저장</button>
            <button className="btn btn-secondary btn-sm" onClick={() => setEditing(false)}>취소</button>
          </div>
        </div>
      ) : (
        <button className="btn btn-secondary btn-sm" style={{ marginBottom: 20 }} onClick={() => setEditing(true)}>
          학년/반 변경
        </button>
      )}

      <div style={{ borderTop: '1px solid #e0f2fe', paddingTop: 20 }}>
        <div style={{ fontSize: '0.85rem', color: '#64748b', marginBottom: 8 }}>
          💾 데이터 저장 방식: <strong>기기 로컬 저장 (localStorage)</strong>
        </div>
        <div style={{ fontSize: '0.82rem', color: '#94a3b8', marginBottom: 16 }}>
          외부 서버 전송 없이 이 기기에만 저장됩니다.
        </div>
        <button className="btn btn-danger btn-sm" onClick={resetAll}>
          전체 데이터 초기화
        </button>
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────
//  App Root
// ─────────────────────────────────────────────────────────────
function App() {
  const [profile,  setProfile]  = useLocalState(STORAGE_KEYS.PROFILE,  null);
  const [subjects, setSubjects] = useLocalState(STORAGE_KEYS.SUBJECTS, []);
  const [slots,    setSlots]    = useLocalState(STORAGE_KEYS.SLOTS,    []);
  const [supplies, setSupplies] = useLocalState(STORAGE_KEYS.SUPPLIES, []);
  const [tab, setTab] = useState('home');

  if (!profile) {
    return (
      <div className="container">
        <div className="header">
          <h1>📅 초등학생 시간표</h1>
          <div className="sub">기기에 저장되는 나만의 시간표</div>
        </div>
        <OnboardingScreen onComplete={p => setProfile(p)} />
      </div>
    );
  }

  const TABS = [
    { id: 'home',     label: '🏠 홈' },
    { id: 'schedule', label: '📅 시간표' },
    { id: 'subjects', label: '✏️ 과목' },
    { id: 'settings', label: '⚙️ 설정' },
  ];

  return (
    <div className="container">
      <div className="header">
        <h1>📅 초등학생 시간표</h1>
        <div className="sub">
          <span className="profile-badge" style={{ fontSize: '0.8rem' }}>
            🎒 {profile.grade}학년 {profile.classNo}반
          </span>
        </div>
      </div>

      <div className="nav-tabs">
        {TABS.map(t => (
          <button
            key={t.id}
            className={`nav-tab${tab === t.id ? ' active' : ''}`}
            onClick={() => setTab(t.id)}
          >
            {t.label}
          </button>
        ))}
      </div>

      <div className="card">
        {tab === 'home' && (
          <HomeTab profile={profile} subjects={subjects} slots={slots} supplies={supplies} />
        )}
        {tab === 'schedule' && (
          <ScheduleTab subjects={subjects} slots={slots} setSlots={setSlots} />
        )}
        {tab === 'subjects' && (
          <SubjectsTab
            subjects={subjects} setSubjects={setSubjects}
            supplies={supplies} setSupplies={setSupplies}
          />
        )}
        {tab === 'settings' && (
          <SettingsTab profile={profile} setProfile={setProfile} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
