<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>📅 내 시간표</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #e8f4fd 0%, #d0eaff 100%);
      font-family: 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      padding: 20px 16px 16px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(79, 172, 254, 0.35);
    }
    .header-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .header-sub {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.85);
      margin-top: 4px;
      font-weight: 700;
    }

    /* ── Grid container ── */
    .grid-wrap {
      overflow-x: auto;
      padding: 16px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .grid {
      display: grid;
      grid-template-columns: 36px repeat(5, 1fr);
      gap: 4px;
      min-width: 320px;
    }

    /* ── Header cells ── */
    .grid-head {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 900;
      border-radius: 10px;
    }
    .grid-head.period-head {
      color: #999;
      background: transparent;
    }
    .grid-head.day-head {
      background: #fff;
      color: #555;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    }
    .grid-head.day-head.today {
      background: linear-gradient(135deg, #4facfe 0%, #00c6fb 100%);
      color: #fff;
      box-shadow: 0 3px 10px rgba(79, 172, 254, 0.45);
    }

    /* ── Period label ── */
    .period-label {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: #aaa;
    }

    /* ── Subject cells ── */
    .subject-cell {
      height: 60px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      text-align: center;
      line-height: 1.3;
      padding: 4px;
      transition: transform 0.13s, box-shadow 0.13s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      border: none;
      width: 100%;
    }
    .subject-cell:active { transform: scale(0.93); }
    .subject-cell:hover  { transform: scale(1.04); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }

    .subject-cell.today-col {
      box-shadow: 0 3px 10px rgba(0,0,0,0.14);
    }

    .supply-dot {
      position: absolute;
      top: 5px;
      right: 6px;
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.85;
    }

    .empty-cell {
      height: 60px;
      border-radius: 12px;
      background: rgba(255,255,255,0.45);
      cursor: default;
    }

    /* ── Pulse animation for current period ── */
    @keyframes pulse-border {
      0%   { box-shadow: 0 0 0 0 rgba(79,172,254,0.6); }
      70%  { box-shadow: 0 0 0 6px rgba(79,172,254,0); }
      100% { box-shadow: 0 0 0 0 rgba(79,172,254,0); }
    }
    .subject-cell.current-period {
      animation: pulse-border 1.8s ease-out infinite;
    }

    /* ── Bottom Sheet overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      animation: fadeOverlay 0.22s ease;
    }
    @keyframes fadeOverlay {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Bottom Sheet ── */
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 101;
      background: #fff;
      border-radius: 28px 28px 0 0;
      padding: 0 0 calc(24px + env(safe-area-inset-bottom));
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* ── Sheet handle ── */
    .sheet-handle {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: #e0e0e0;
      margin: 12px auto 0;
    }

    /* ── Sheet banner (subject color) ── */
    .sheet-banner {
      padding: 20px 20px 16px;
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sheet-banner-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      background: rgba(255,255,255,0.3);
    }
    .sheet-banner-text {}
    .sheet-subject-name {
      font-size: 1.55rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .sheet-period-info {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.85);
      font-weight: 700;
      margin-top: 2px;
    }
    .sheet-close {
      margin-left: auto;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      min-width: 44px;
      min-height: 44px;
      touch-action: manipulation;
    }
    .sheet-close:active { transform: scale(0.88); }

    /* ── Sheet body ── */
    .sheet-body { padding: 0 20px; }

    /* ── Section ── */
    .section {
      margin-top: 20px;
    }
    .section-label {
      font-size: 0.78rem;
      font-weight: 900;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    /* ── Teacher input ── */
    .teacher-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f7f8fa;
      border-radius: 14px;
      padding: 12px 14px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .teacher-input-wrap:focus-within {
      border-color: #4facfe;
      background: #f0f8ff;
    }
    .teacher-icon { font-size: 1.3rem; flex-shrink: 0; }
    .teacher-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1rem;
      font-weight: 700;
      color: #333;
      outline: none;
      font-family: inherit;
    }
    .teacher-input::placeholder { color: #ccc; font-weight: 600; }
    .teacher-save-btn {
      background: #4facfe;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 6px 12px;
      cursor: pointer;
      min-height: 36px;
      min-width: 44px;
      transition: transform 0.1s;
      touch-action: manipulation;
    }
    .teacher-save-btn:active { transform: scale(0.93); }

    /* ── Supplies ── */
    .supply-list { display: flex; flex-direction: column; gap: 8px; }

    .supply-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f7f8fa;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .supply-bullet {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .supply-name {
      flex: 1;
      font-size: 0.98rem;
      font-weight: 700;
      color: #333;
    }
    .supply-del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      min-width: 36px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: color 0.12s, background 0.12s;
      touch-action: manipulation;
    }
    .supply-del-btn:hover { color: #ef4444; background: #fff0f0; }

    .supply-add-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .supply-input {
      flex: 1;
      border: 2px solid #e8ecf0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #333;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
      min-height: 44px;
    }
    .supply-input:focus { border-color: #4facfe; }
    .supply-input::placeholder { color: #ccc; font-weight: 600; }
    .supply-add-btn {
      background: linear-gradient(135deg, #4facfe, #00c6fb);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 900;
      padding: 0 16px;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
      transition: transform 0.1s, opacity 0.15s;
    }
    .supply-add-btn:hover:not(:disabled) { transform: scale(1.07); }
    .supply-add-btn:active:not(:disabled) { transform: scale(0.93); }
    .supply-add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .supply-empty {
      text-align: center;
      padding: 18px 0 8px;
      font-size: 0.9rem;
      color: #bbb;
      font-weight: 700;
    }
    .supply-count {
      font-size: 0.78rem;
      color: #bbb;
      font-weight: 700;
      text-align: right;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const DAYS = ['월', '화', '수', '목', '금'];
    const PERIODS = [1, 2, 3, 4, 5, 6, 7];
    const MAX_SUPPLIES = 10;
    const STORAGE_KEY = 'timetable_v1';

    const SUBJECT_ICONS = {
      '국어': '📖', '수학': '✏️', '영어': '🔤', '과학': '🔬',
      '사회': '🌏', '체육': '⚽', '음악': '🎵', '미술': '🎨',
      '도덕': '🌟', '실과': '🌱', '역사': '📜', '': '📚',
    };

    function getSubjectIcon(name) {
      return SUBJECT_ICONS[name] || '📚';
    }

    const DEFAULT_TIMETABLE = {
      '월-1': { name: '국어', color: '#FF6B6B' },
      '월-2': { name: '수학', color: '#4ECDC4' },
      '월-3': { name: '영어', color: '#45B7D1' },
      '월-4': { name: '사회', color: '#96CEB4' },
      '월-5': { name: '체육', color: '#FFEAA7', textColor: '#8B7355' },
      '월-6': { name: '음악', color: '#DDA0DD' },
      '화-1': { name: '수학', color: '#4ECDC4' },
      '화-2': { name: '국어', color: '#FF6B6B' },
      '화-3': { name: '과학', color: '#98D8C8' },
      '화-4': { name: '영어', color: '#45B7D1' },
      '화-5': { name: '미술', color: '#FFB347' },
      '화-6': { name: '도덕', color: '#87CEEB' },
      '화-7': { name: '수학', color: '#4ECDC4' },
      '수-1': { name: '영어', color: '#45B7D1' },
      '수-2': { name: '사회', color: '#96CEB4' },
      '수-3': { name: '국어', color: '#FF6B6B' },
      '수-4': { name: '체육', color: '#FFEAA7', textColor: '#8B7355' },
      '수-5': { name: '과학', color: '#98D8C8' },
      '목-1': { name: '국어', color: '#FF6B6B' },
      '목-2': { name: '미술', color: '#FFB347' },
      '목-3': { name: '수학', color: '#4ECDC4' },
      '목-4': { name: '영어', color: '#45B7D1' },
      '목-5': { name: '음악', color: '#DDA0DD' },
      '목-6': { name: '사회', color: '#96CEB4' },
      '금-1': { name: '체육', color: '#FFEAA7', textColor: '#8B7355' },
      '금-2': { name: '국어', color: '#FF6B6B' },
      '금-3': { name: '도덕', color: '#87CEEB' },
      '금-4': { name: '수학', color: '#4ECDC4' },
      '금-5': { name: '실과', color: '#C8E6C9' },
    };

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }

    function saveData(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    }

    function getTodayDay() {
      const d = new Date().getDay();
      if (d === 0 || d === 6) return null;
      return DAYS[d - 1];
    }

    function getCurrentPeriod() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const total = h * 60 + m;
      const schedules = [
        [9*60,    9*60+40],
        [9*60+50, 10*60+30],
        [10*60+40,11*60+20],
        [11*60+30,12*60+10],
        [13*60+10,13*60+50],
        [14*60,   14*60+40],
        [14*60+50,15*60+30],
      ];
      for (let i = 0; i < schedules.length; i++) {
        const [start, end] = schedules[i];
        if (total >= start && total <= end) return i + 1;
      }
      return null;
    }

    /* ── Subject Detail Bottom Sheet ── */
    function SubjectSheet({ cellKey, subject, data, onClose, onSave }) {
      const [day, periodStr] = cellKey.split('-');
      const period = parseInt(periodStr);
      const icon = getSubjectIcon(subject.name);
      const savedData = data[cellKey] || {};

      const [teacher, setTeacher] = useState(savedData.teacher || '');
      const [supplies, setSupplies] = useState(savedData.supplies || []);
      const [newSupply, setNewSupply] = useState('');
      const inputRef = useRef(null);

      function handleSaveTeacher() {
        const updated = { ...savedData, teacher: teacher.trim() };
        onSave(cellKey, updated);
      }

      function handleAddSupply() {
        const trimmed = newSupply.trim();
        if (!trimmed || supplies.length >= MAX_SUPPLIES) return;
        const next = [...supplies, trimmed];
        setSupplies(next);
        setNewSupply('');
        onSave(cellKey, { ...savedData, teacher: teacher.trim(), supplies: next });
        inputRef.current?.focus();
      }

      function handleDeleteSupply(idx) {
        const next = supplies.filter((_, i) => i !== idx);
        setSupplies(next);
        onSave(cellKey, { ...savedData, teacher: teacher.trim(), supplies: next });
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter') handleAddSupply();
      }

      return (
        <>
          <div className="overlay" onClick={onClose} aria-hidden="true" />
          <div
            className="sheet"
            role="dialog"
            aria-modal="true"
            aria-label={`${subject.name} 상세 정보`}
          >
            <div className="sheet-handle" aria-hidden="true" />

            {/* Banner */}
            <div className="sheet-banner" style={{ background: `linear-gradient(135deg, ${subject.color}ee, ${subject.color})` }}>
              <div className="sheet-banner-icon" aria-hidden="true">{icon}</div>
              <div className="sheet-banner-text">
                <div className="sheet-subject-name">{subject.name}</div>
                <div className="sheet-period-info">{day}요일 {period}교시</div>
              </div>
              <button
                className="sheet-close"
                onClick={onClose}
                aria-label="닫기"
              >✕</button>
            </div>

            <div className="sheet-body">
              {/* Teacher */}
              <div className="section">
                <div className="section-label">담당 선생님</div>
                <div className="teacher-input-wrap">
                  <span className="teacher-icon" aria-hidden="true">👩‍🏫</span>
                  <input
                    className="teacher-input"
                    type="text"
                    value={teacher}
                    onChange={e => setTeacher(e.target.value)}
                    onBlur={handleSaveTeacher}
                    placeholder="선생님 이름 (선택)"
                    maxLength={20}
                    aria-label="담당 선생님 이름"
                  />
                  <button
                    className="teacher-save-btn"
                    onClick={handleSaveTeacher}
                    aria-label="선생님 이름 저장"
                  >저장</button>
                </div>
              </div>

              {/* Supplies */}
              <div className="section">
                <div className="section-label">준비물</div>

                {supplies.length === 0 ? (
                  <div className="supply-empty">아직 준비물이 없어요 🎒</div>
                ) : (
                  <ul className="supply-list" aria-label="준비물 목록">
                    {supplies.map((item, idx) => (
                      <li key={idx} className="supply-item">
                        <span
                          className="supply-bullet"
                          style={{ background: subject.color }}
                          aria-hidden="true"
                        />
                        <span className="supply-name">{item}</span>
                        <button
                          className="supply-del-btn"
                          onClick={() => handleDeleteSupply(idx)}
                          aria-label={`${item} 삭제`}
                        >✕</button>
                      </li>
                    ))}
                  </ul>
                )}

                {supplies.length < MAX_SUPPLIES ? (
                  <div className="supply-add-row">
                    <input
                      ref={inputRef}
                      className="supply-input"
                      type="text"
                      value={newSupply}
                      onChange={e => setNewSupply(e.target.value)}
                      onKeyDown={handleKeyDown}
                      placeholder="준비물 추가..."
                      maxLength={20}
                      aria-label="준비물 입력"
                    />
                    <button
                      className="supply-add-btn"
                      onClick={handleAddSupply}
                      disabled={!newSupply.trim()}
                      aria-label="준비물 추가"
                    >+</button>
                  </div>
                ) : (
                  <div className="supply-count" aria-live="polite">
                    최대 {MAX_SUPPLIES}개까지 등록할 수 있어요.
                  </div>
                )}

                {supplies.length > 0 && supplies.length < MAX_SUPPLIES && (
                  <div className="supply-count" aria-live="polite">
                    {supplies.length}/{MAX_SUPPLIES}
                  </div>
                )}
              </div>

              {/* Spacer */}
              <div style={{ height: 20 }} />
            </div>
          </div>
        </>
      );
    }

    /* ── Main App ── */
    function App() {
      const [extraData, setExtraData] = useState(() => loadData());
      const [selected, setSelected] = useState(null);
      const todayDay = getTodayDay();
      const currentPeriod = getCurrentPeriod();

      function handleCellTap(key) {
        if (!DEFAULT_TIMETABLE[key]) return;
        setSelected(key);
      }

      function handleSave(cellKey, patch) {
        const updated = { ...extraData, [cellKey]: { ...(extraData[cellKey] || {}), ...patch } };
        setExtraData(updated);
        saveData(updated);
      }

      function handleClose() {
        setSelected(null);
      }

      const selectedSubject = selected ? DEFAULT_TIMETABLE[selected] : null;

      return (
        <div>
          <div className="header">
            <div className="header-title">📅 내 시간표</div>
            <div className="header-sub">과목을 탭하면 준비물을 확인해요!</div>
          </div>

          <div className="grid-wrap">
            <div className="grid" role="grid" aria-label="주간 시간표">
              {/* Top-left corner */}
              <div className="grid-head period-head" role="columnheader" aria-label="교시" />

              {/* Day headers */}
              {DAYS.map(day => {
                const isToday = day === todayDay;
                return (
                  <div
                    key={day}
                    className={`grid-head day-head${isToday ? ' today' : ''}`}
                    role="columnheader"
                    aria-label={`${day}요일${isToday ? ' (오늘)' : ''}`}
                  >
                    {day}{isToday ? '' : ''}
                  </div>
                );
              })}

              {/* Period rows */}
              {PERIODS.map(period => (
                <React.Fragment key={period}>
                  <div
                    className="period-label"
                    role="rowheader"
                    aria-label={`${period}교시`}
                  >
                    {period}
                  </div>
                  {DAYS.map(day => {
                    const key = `${day}-${period}`;
                    const subj = DEFAULT_TIMETABLE[key];
                    const isToday = day === todayDay;
                    const isCurrent = isToday && currentPeriod === period;
                    const cellData = extraData[key] || {};
                    const hasSupplies = cellData.supplies && cellData.supplies.length > 0;

                    if (!subj) {
                      return (
                        <div
                          key={key}
                          className="empty-cell"
                          role="gridcell"
                          aria-label={`${day}요일 ${period}교시 빈 교시`}
                        />
                      );
                    }

                    return (
                      <button
                        key={key}
                        className={[
                          'subject-cell',
                          isToday ? 'today-col' : '',
                          isCurrent ? 'current-period' : '',
                        ].filter(Boolean).join(' ')}
                        style={{
                          background: subj.color,
                          color: subj.textColor || '#fff',
                        }}
                        onClick={() => handleCellTap(key)}
                        role="gridcell"
                        aria-label={`${day}요일 ${period}교시 ${subj.name}${isCurrent ? ' (현재 수업)' : ''}${hasSupplies ? ` 준비물 ${cellData.supplies.length}개` : ''}`}
                      >
                        {hasSupplies && (
                          <span className="supply-dot" aria-hidden="true" />
                        )}
                        {subj.name}
                      </button>
                    );
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>

          {selected && selectedSubject && (
            <SubjectSheet
              cellKey={selected}
              subject={selectedSubject}
              data={extraData}
              onClose={handleClose}
              onSave={handleSave}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
