<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📅 오늘 시간표</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      padding: 20px 16px 40px;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #e8f4fd 0%, #dbeafe 50%, #ede9fe 100%);
    }

    .app {
      width: min(100%, 420px);
      margin: 0 auto;
    }

    .app-title {
      font-size: 1.55rem;
      font-weight: 900;
      color: #1e40af;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    /* ── Summary Card ── */
    .summary-card {
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      border-radius: 28px;
      padding: 22px 24px 20px;
      color: #fff;
      box-shadow: 0 10px 36px rgba(59, 130, 246, 0.38);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .summary-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
    }

    .summary-card.weekend {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      box-shadow: 0 10px 36px rgba(6,182,212,0.35);
    }

    .summary-date {
      font-size: 1.05rem;
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    /* Stats row */
    .summary-stats {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 12px 0;
    }

    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-num {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .stat-num.remaining {
      color: #fde68a;
    }

    .stat-label {
      font-size: 0.78rem;
      font-weight: 700;
      opacity: 0.85;
      letter-spacing: 0.02em;
    }

    .stat-divider {
      width: 1.5px;
      height: 42px;
      background: rgba(255,255,255,0.3);
    }

    /* Next class */
    .next-class {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-left: 5px solid #fff;
    }

    .next-class-label {
      font-size: 0.82rem;
      font-weight: 700;
      opacity: 0.85;
      white-space: nowrap;
    }

    .next-class-name {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    /* Countdown */
    .countdown-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .countdown-badge {
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .countdown-badge.during   { background: #fef3c7; color: #92400e; }
    .countdown-badge.break    { background: #d1fae5; color: #065f46; }
    .countdown-badge.lunch    { background: #fce7f3; color: #9d174d; }
    .countdown-badge.before   { background: #e0e7ff; color: #3730a3; }
    .countdown-badge.done     { background: #d1fae5; color: #065f46; }
    .countdown-badge.no_class { background: #f3f4f6; color: #374151; }

    .countdown-text {
      font-size: 1rem;
      font-weight: 700;
      opacity: 0.95;
    }

    .countdown-num {
      font-size: 1.2rem;
      font-weight: 900;
    }

    /* Weekend & done messages */
    .summary-rest-msg {
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      padding: 10px 0;
    }

    /* ── Timetable sections ── */
    .section-title {
      font-size: 0.9rem;
      font-weight: 800;
      color: #4b5563;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .panel {
      background: rgba(255,255,255,0.85);
      border-radius: 22px;
      padding: 18px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      margin-bottom: 16px;
    }

    .helper-text {
      font-size: 0.88rem;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .schedule-form {
      display: grid;
      gap: 12px;
    }

    .form-row {
      display: grid;
      gap: 12px;
    }

    .field-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 800;
      color: #4b5563;
      margin-bottom: 6px;
    }

    .field-input,
    .field-select {
      width: 100%;
      border: 2px solid #dbeafe;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      color: #1f2937;
      background: #fff;
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .field-input:focus,
    .field-select:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
    }

    .error-text {
      font-size: 0.82rem;
      font-weight: 700;
      color: #dc2626;
    }

    .btn-add {
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 900;
      padding: 14px 16px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(37,99,235,0.24);
    }

    .btn-add:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .weekly-days {
      display: grid;
      gap: 12px;
    }

    .day-card {
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid #dbeafe;
      padding: 14px;
    }

    .day-card.today {
      border-color: #60a5fa;
      box-shadow: 0 10px 22px rgba(96,165,250,0.18);
      background: linear-gradient(180deg, #eff6ff 0%, #f8fbff 100%);
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .day-name {
      font-size: 1rem;
      font-weight: 900;
      color: #1d4ed8;
    }

    .day-badge {
      font-size: 0.72rem;
      font-weight: 800;
      color: #1d4ed8;
      background: #dbeafe;
      border-radius: 999px;
      padding: 4px 8px;
    }

    .entry-list {
      display: grid;
      gap: 8px;
    }

    .entry-item {
      border-radius: 16px;
      background: #fff;
      padding: 12px 14px;
      border-left: 6px solid #94a3b8;
      box-shadow: 0 2px 10px rgba(15,23,42,0.05);
    }

    .entry-time {
      display: block;
      font-size: 0.8rem;
      font-weight: 800;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .entry-subject {
      display: block;
      font-size: 1rem;
      font-weight: 900;
      color: #111827;
      line-height: 1.35;
    }

    .no-schedule-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 16px 0;
    }
    @media (min-width: 640px) {
      .form-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Korean elementary school class schedule ──────────────────────────────
    // Standard schedule (minutes from midnight)
    const CLASS_TIMES = [
      { period: 1, start: 9*60+0,   end: 9*60+40  },  // 09:00–09:40
      { period: 2, start: 9*60+50,  end: 10*60+30 },  // 09:50–10:30
      { period: 3, start: 10*60+40, end: 11*60+20 },  // 10:40–11:20
      { period: 4, start: 11*60+30, end: 12*60+10 },  // 11:30–12:10
      { period: 5, start: 13*60+0,  end: 13*60+40 },  // 13:00–13:40
      { period: 6, start: 13*60+50, end: 14*60+30 },  // 13:50–14:30
      { period: 7, start: 14*60+40, end: 15*60+20 },  // 14:40–15:20
    ];

    const LUNCH_START = 12*60+10;  // 12:10
    const LUNCH_END   = 13*60+0;   // 13:00

    const DAYS = ['월','화','수','목','금'];

    // ── Default demo timetable ───────────────────────────────────────────────
    const SUBJECT_COLORS = {
      국어: '#ef4444', 수학: '#3b82f6', 영어: '#10b981',
      과학: '#8b5cf6', 체육: '#f97316', 음악: '#ec4899',
      사회: '#06b6d4', 미술: '#f59e0b', 도덕: '#6366f1',
    };

    const DEFAULT_SCHEDULE = {
      월: ['국어','수학','영어','과학', null, null, null],
      화: ['수학','국어','체육','음악','미술', null, null],
      수: ['영어','사회','국어','수학','도덕', null, null],
      목: ['과학','체육','수학','국어','영어','음악', null],
      금: ['국어','미술','사회','수학','체육', null, null],
    };

    const STORAGE_KEY = 'timetable_v1';

    const ENTRY_COLORS = ['#ef4444', '#3b82f6', '#10b981', '#8b5cf6', '#f97316', '#ec4899', '#06b6d4', '#f59e0b', '#14b8a6', '#6366f1'];

    function minutesToTime(totalMinutes) {
      const hours = String(Math.floor(totalMinutes / 60)).padStart(2, '0');
      const mins = String(totalMinutes % 60).padStart(2, '0');
      return `${hours}:${mins}`;
    }

    function buildEntriesFromSchedule(schedule) {
      return DAYS.flatMap(day =>
        (schedule[day] || []).flatMap((subject, index) => {
          if (!subject) return [];
          const slot = CLASS_TIMES[index];
          if (!slot) return [];
          return [{
            id: `${day}-${index}-${subject}`,
            day,
            subject,
            startTime: minutesToTime(slot.start),
            endTime: minutesToTime(slot.end),
          }];
        })
      );
    }

    function sanitizeEntry(entry, index) {
      if (!entry || !DAYS.includes(entry.day)) return null;
      if (typeof entry.subject !== 'string' || !entry.subject.trim()) return null;
      if (typeof entry.startTime !== 'string' || typeof entry.endTime !== 'string') return null;
      return {
        id: entry.id || `entry-${index}`,
        day: entry.day,
        subject: entry.subject.trim(),
        startTime: entry.startTime,
        endTime: entry.endTime,
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed?.entries)) {
          return {
            entries: parsed.entries.map(sanitizeEntry).filter(Boolean),
            subjectColors: parsed.subjectColors || SUBJECT_COLORS,
            grade: parsed.grade || 3,
            classNum: parsed.classNum || 2,
          };
        }
        if (parsed?.schedule) {
          return {
            entries: buildEntriesFromSchedule(parsed.schedule),
            subjectColors: parsed.subjectColors || SUBJECT_COLORS,
            grade: parsed.grade || 3,
            classNum: parsed.classNum || 2,
          };
        }
        return null;
      } catch { return null; }
    }

    function getDefaultData() {
      return {
        entries: buildEntriesFromSchedule(DEFAULT_SCHEDULE),
        subjectColors: SUBJECT_COLORS,
        grade: 3,
        classNum: 2,
      };
    }

    // ── Time helpers ─────────────────────────────────────────────────────────
    function nowMin() {
      const d = new Date();
      return d.getHours() * 60 + d.getMinutes();
    }

    function nowSec() {
      const d = new Date();
      return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
    }

    function getDayKey() {
      const day = new Date().getDay();
      if (day === 0 || day === 6) return null;
      return DAYS[day - 1];
    }

    function fmtDate() {
      const d = new Date();
      const dayNames = ['일','월','화','수','목','금','토'];
      return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;
    }

    function fmtCountdown(totalSec) {
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      if (m === 0) return `${s}초`;
      if (s === 0) return `${m}분`;
      return `${m}분 ${s}초`;
    }

    function timeToMinutes(value) {
      const [hour, minute] = value.split(':').map(Number);
      return hour * 60 + minute;
    }

    function sortEntries(entries) {
      return [...entries].sort((a, b) => {
        const dayDiff = DAYS.indexOf(a.day) - DAYS.indexOf(b.day);
        if (dayDiff !== 0) return dayDiff;
        const startDiff = timeToMinutes(a.startTime) - timeToMinutes(b.startTime);
        if (startDiff !== 0) return startDiff;
        return timeToMinutes(a.endTime) - timeToMinutes(b.endTime);
      });
    }

    // ── Summary computation ───────────────────────────────────────────────────
    function calcSummary(entries, colors) {
      const dayKey = getDayKey();

      if (!dayKey) return { isWeekend: true };

      const todayClasses = sortEntries(entries)
        .filter(entry => entry.day === dayKey)
        .map(entry => ({
          start: timeToMinutes(entry.startTime),
          end: timeToMinutes(entry.endTime),
          subject: entry.subject,
        }));

      const totalCount = todayClasses.length;
      const now = nowMin();
      const nowS = nowSec();

      const remaining = todayClasses.filter(c => c.end > now);
      const remainingCount = remaining.length;

      // Determine status
      let status = 'before';
      let nextSubject = null;
      let nextColor = null;
      let countdownSec = null;

      const lastClass = todayClasses[todayClasses.length - 1];

      if (totalCount === 0) {
        status = 'no_class';
      } else if (lastClass && now >= lastClass.end) {
        status = 'done';
      } else {
        // Check each slot
        for (let i = 0; i < todayClasses.length; i++) {
          const cls = todayClasses[i];
          const clsStartSec = cls.start * 60;
          const clsEndSec   = cls.end   * 60;

          if (nowS >= clsStartSec && nowS < clsEndSec) {
            // Currently in this class
            status = 'during';
            nextSubject = cls.subject;
            nextColor   = colors[cls.subject] || '#6366f1';
            countdownSec = clsEndSec - nowS;
            break;
          }

          const prevEnd = i > 0 ? todayClasses[i-1].end * 60 : null;
          if (prevEnd !== null && nowS >= prevEnd && nowS < clsStartSec) {
            // In gap before this class
            if (now >= LUNCH_START && now < LUNCH_END) {
              status = 'lunch';
            } else {
              status = 'break';
            }
            nextSubject  = cls.subject;
            nextColor    = colors[cls.subject] || '#6366f1';
            countdownSec = clsStartSec - nowS;
            break;
          }

          if (i === 0 && nowS < clsStartSec) {
            status = 'before';
            nextSubject  = cls.subject;
            nextColor    = colors[cls.subject] || '#6366f1';
            countdownSec = clsStartSec - nowS;
            break;
          }
        }
      }

      return {
        isWeekend: false,
        dayKey,
        dateStr: fmtDate(),
        totalCount,
        remainingCount,
        nextSubject,
        nextColor,
        status,
        countdownSec,
      };
    }

    // ── Badge label ──────────────────────────────────────────────────────────
    const STATUS_BADGE = {
      during:   '수업 중',
      break:    '쉬는 시간',
      lunch:    '점심시간',
      before:   '수업 전',
      done:     '수업 종료',
      no_class: '수업 없음',
    };

    function getCountdownMsg(status, nextSubject, countdownSec) {
      const t = countdownSec !== null ? fmtCountdown(countdownSec) : '';
      if (status === 'done')     return '오늘 일정이 모두 끝났어요! 🎊';
      if (status === 'no_class') return '오늘은 등록된 일정이 없어요 😊';
      if (status === 'during')   return `지금 일정이 끝날 때까지 ${t} 남았어요`;
      if (status === 'lunch')    return `점심시간 🍱 — ${nextSubject} 시작까지 ${t}`;
      if (status === 'break')    return `쉬는 시간 ⏰ — ${nextSubject} 시작까지 ${t}`;
      return `${nextSubject} 시작까지 ${t}`;
    }

    // ── SummaryCard component ────────────────────────────────────────────────
    function SummaryCard({ entries, colors }) {
      const [summary, setSummary] = useState(() => calcSummary(entries, colors));

      useEffect(() => {
        const id = setInterval(() => setSummary(calcSummary(entries, colors)), 1000);
        return () => clearInterval(id);
      }, [entries, colors]);

      if (summary.isWeekend) {
        return (
          <div className="summary-card weekend">
            <div className="summary-date">{fmtDate()}</div>
            <div className="summary-rest-msg">주말이에요! 푹 쉬어요 🎉</div>
          </div>
        );
      }

      const { dateStr, totalCount, remainingCount, nextSubject, nextColor, status, countdownSec } = summary;

      return (
        <div className="summary-card" role="region" aria-label="오늘의 시간표 요약">
          <div className="summary-date">{dateStr}</div>

          <div className="summary-stats" aria-label={`전체 일정 ${totalCount}개, 남은 일정 ${remainingCount}개`}>
            <div className="stat-item">
              <span className="stat-num">{totalCount}</span>
              <span className="stat-label">전체 일정</span>
            </div>
            <div className="stat-divider" aria-hidden="true" />
            <div className="stat-item">
              <span className="stat-num remaining">{remainingCount}</span>
              <span className="stat-label">남은 일정</span>
            </div>
          </div>

          {nextSubject && (
            <div className="next-class" style={{ borderLeftColor: nextColor }}>
              <span className="next-class-label">다음 일정</span>
              <span className="next-class-name">{nextSubject}</span>
            </div>
          )}

          <div className="countdown-row">
            <span className={`countdown-badge ${status}`}>
              {STATUS_BADGE[status] ?? status}
            </span>
            <span className="countdown-text">
              {getCountdownMsg(status, nextSubject, countdownSec)}
            </span>
          </div>
        </div>
      );
    }

    function makeSubjectColors(currentColors, entries) {
      const nextColors = { ...currentColors };
      let colorIndex = Object.keys(nextColors).length;
      entries.forEach(entry => {
        if (!nextColors[entry.subject]) {
          nextColors[entry.subject] = ENTRY_COLORS[colorIndex % ENTRY_COLORS.length];
          colorIndex += 1;
        }
      });
      return nextColors;
    }

    function ScheduleForm({ onAdd }) {
      const [form, setForm] = useState({
        day: getDayKey() || DAYS[0],
        subject: '',
        startTime: '09:00',
        endTime: '09:40',
      });
      const [error, setError] = useState('');

      function updateField(key, value) {
        setForm(current => ({ ...current, [key]: value }));
        setError('');
      }

      function handleSubmit(event) {
        event.preventDefault();
        const subject = form.subject.trim();
        if (!subject) {
          setError('과목명을 입력해 주세요.');
          return;
        }
        if (timeToMinutes(form.startTime) >= timeToMinutes(form.endTime)) {
          setError('종료 시각은 시작 시각보다 늦어야 해요.');
          return;
        }
        onAdd({
          id: `entry-${Date.now()}`,
          day: form.day,
          subject,
          startTime: form.startTime,
          endTime: form.endTime,
        });
        setForm(current => ({ ...current, subject: '' }));
      }

      return (
        <div className="panel">
          <div className="section-title">✏️ 시간표 등록</div>
          <div className="helper-text">요일, 과목명, 시작 시각, 종료 시각을 입력해 수업이나 공부 계획을 추가할 수 있어요.</div>
          <form className="schedule-form" onSubmit={handleSubmit}>
            <div className="form-row">
              <label>
                <span className="field-label">요일</span>
                <select className="field-select" value={form.day} onChange={e => updateField('day', e.target.value)}>
                  {DAYS.map(day => <option key={day} value={day}>{day}요일</option>)}
                </select>
              </label>
              <label>
                <span className="field-label">시작 시각</span>
                <input className="field-input" type="time" value={form.startTime} onChange={e => updateField('startTime', e.target.value)} />
              </label>
              <label>
                <span className="field-label">종료 시각</span>
                <input className="field-input" type="time" value={form.endTime} onChange={e => updateField('endTime', e.target.value)} />
              </label>
            </div>
            <label>
              <span className="field-label">과목명</span>
              <input
                className="field-input"
                type="text"
                maxLength="20"
                placeholder="예: 수학, 독서, 영어 숙제"
                value={form.subject}
                onChange={e => updateField('subject', e.target.value)}
              />
            </label>
            {error ? <div className="error-text">{error}</div> : null}
            <button className="btn-add" type="submit">시간표에 추가하기</button>
          </form>
        </div>
      );
    }

    function WeeklySchedule({ entries, colors }) {
      const dayKey = getDayKey();
      const grouped = DAYS.map(day => ({
        day,
        entries: sortEntries(entries).filter(entry => entry.day === day),
      }));

      return (
        <div className="panel">
          <div className="section-title">📋 이번 주 시간표</div>
          <div className="weekly-days">
            {grouped.map(group => (
              <div key={group.day} className={`day-card${group.day === dayKey ? ' today' : ''}`}>
                <div className="day-header">
                  <span className="day-name">{group.day}요일</span>
                  {group.day === dayKey ? <span className="day-badge">오늘</span> : null}
                </div>
                {group.entries.length === 0 ? (
                  <div className="no-schedule-msg">아직 등록된 시간표가 없어요.</div>
                ) : (
                  <div className="entry-list">
                    {group.entries.map(entry => (
                      <div
                        key={entry.id}
                        className="entry-item"
                        style={{ borderLeftColor: colors[entry.subject] || '#94a3b8' }}
                        aria-label={`${group.day}요일 ${entry.startTime}부터 ${entry.endTime}까지 ${entry.subject}`}
                      >
                        <span className="entry-time">{entry.startTime} - {entry.endTime}</span>
                        <span className="entry-subject">{entry.subject}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [data, setData] = useState(() => {
        const initial = loadData() || getDefaultData();
        return {
          ...initial,
          entries: sortEntries(initial.entries),
          subjectColors: makeSubjectColors(initial.subjectColors || SUBJECT_COLORS, initial.entries),
        };
      });

      function handleAddEntry(entry) {
        const nextEntries = sortEntries([...data.entries, entry]);
        const nextData = {
          ...data,
          entries: nextEntries,
          subjectColors: makeSubjectColors(data.subjectColors, nextEntries),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nextData));
        setData(nextData);
      }

      return (
        <div className="app">
          <div className="app-title">📅 오늘 시간표</div>
          <SummaryCard entries={data.entries} colors={data.subjectColors} />
          <ScheduleForm onAdd={handleAddEntry} />
          <WeeklySchedule entries={data.entries} colors={data.subjectColors} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
