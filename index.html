<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍅 뽀모도로 타이머</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      transition: background 0.8s ease;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
    }

    body.break-bg {
      background: linear-gradient(135deg, #d4f1e4 0%, #89f7cf 50%, #60e6b9 100%);
    }

    .app {
      width: min(100%, 440px);
      background: rgba(255, 255, 255, 0.93);
      border-radius: 32px;
      padding: 36px 28px 28px;
      box-shadow: 0 16px 60px rgba(200, 80, 60, 0.18);
      text-align: center;
      position: relative;
    }

    .app-title {
      font-size: 1.7rem;
      font-weight: 900;
      color: #d94f2b;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    /* ── Settings ── */
    .settings { margin-bottom: 24px; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .setting-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #666;
      width: 80px;
      text-align: right;
    }

    .setting-value {
      font-size: 1.3rem;
      font-weight: 900;
      color: #1a1a2e;
      min-width: 58px;
      text-align: center;
    }

    /* ── Stepper buttons ── */
    .stepper-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      font-size: 1.35rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ff8c6b;
      color: #fff;
      transition: transform 0.12s, opacity 0.2s;
      line-height: 1;
    }
    .stepper-btn:hover:not(:disabled) { transform: scale(1.1); }
    .stepper-btn:active:not(:disabled) { transform: scale(0.93); }
    .stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Mode label ── */
    .mode-label {
      font-size: 1.2rem;
      font-weight: 800;
      color: #d94f2b;
      margin-bottom: 4px;
    }
    .mode-label.break-mode { color: #0ca678; }

    /* ── Timer ring ── */
    .timer-ring-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 8px auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg {
      position: absolute;
      top: 0; left: 0;
      transform: rotate(-90deg);
    }

    .ring-bg    { fill: none; stroke: #f0e0d8; stroke-width: 10; }
    .ring-track { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.6s linear; }
    .ring-focus { stroke: #ff6b6b; }
    .ring-break { stroke: #20c997; }

    .timer-display {
      font-size: clamp(3rem, 14vw, 4.5rem);
      font-weight: 900;
      color: #1a1a2e;
      letter-spacing: -0.04em;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* ── Pre-start timer preview ── */
    .timer-preview {
      font-size: 2.5rem;
      font-weight: 900;
      color: #bbb;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
    }

    /* ── Control buttons ── */
    .btn {
      min-width: 44px;
      min-height: 48px;
      border: none;
      border-radius: 18px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      padding: 12px 28px;
      transition: transform 0.1s, box-shadow 0.1s;
      touch-action: manipulation;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.13); }
    .btn:active { transform: translateY(0); box-shadow: none; }

    /* WCAG 2.1 AA — contrast ratios verified ≥ 4.5:1 */
    .btn-start {
      font-size: 1.25rem;
      padding: 16px 52px;
      min-height: 56px;
      border-radius: 22px;
      background: #2E7D32; /* white on #2E7D32 = 5.5:1 ✓ AA */
      color: #fff;
      box-shadow: 0 4px 18px rgba(46, 125, 50, 0.45);
    }
    .btn-pause  { background: #E65100; color: #fff; box-shadow: 0 4px 14px rgba(230,81,0,.4); } /* 4.7:1 ✓ AA */
    .btn-resume { background: #1565C0; color: #fff; box-shadow: 0 4px 14px rgba(21,101,192,.4); } /* 7.1:1 ✓ AA */
    .btn-reset  { background: #6A1B9A; color: #fff; } /* 6.5:1 ✓ AA */

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 4px;
    }

    /* ── Sessions ── */
    .sessions {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 2px dashed #f5d8d0;
    }

    .sessions-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .tomatoes {
      font-size: 1.45rem;
      line-height: 1.8;
      min-height: 2rem;
      word-break: break-word;
    }

    .tomatoes-empty { font-size: 0.9rem; color: #ccc; }

    /* ── Notification overlay ── */
    .notif-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 200;
    }

    .notif-box {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 28px;
      padding: 28px 44px;
      font-size: 1.85rem;
      font-weight: 900;
      color: #d94f2b;
      box-shadow: 0 16px 48px rgba(0,0,0,0.14);
      animation: notifFadeIn 0.5s ease-out both;
      text-align: center;
    }

    .notif-box.break-notif { color: #0ca678; }

    @keyframes notifFadeIn {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Ops Log ── */
    .ops-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px dashed #f5d8d0;
    }

    .ops-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
    }

    .ops-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .ops-badge {
      background: #ef4444;
      color: #fff;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 2px 7px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .ops-toggle-btn {
      background: none;
      border: none;
      font-size: 0.8rem;
      color: #bbb;
      cursor: pointer;
      padding: 2px 6px;
      min-height: 28px;
      min-width: 28px;
    }

    .ops-list {
      list-style: none;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ops-entry {
      border-radius: 12px;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.82rem;
    }

    .ops-entry.ops-failed   { background: #fff1f0; border: 1px solid #ffccc7; }
    .ops-entry.ops-pending  { background: #fff7e6; border: 1px solid #ffe7ba; }
    .ops-entry.ops-success  { background: #f6ffed; border: 1px solid #b7eb8f; }
    .ops-entry.ops-retrying { background: #e6f7ff; border: 1px solid #91d5ff; }

    .ops-entry-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .ops-status {
      font-weight: 800;
      font-size: 0.75rem;
      border-radius: 6px;
      padding: 1px 6px;
    }

    .ops-failed   .ops-status { color: #cf1322; background: #fff0ee; }
    .ops-pending  .ops-status { color: #d46b08; background: #fff3e0; }
    .ops-success  .ops-status { color: #389e0d; background: #f0fce4; }
    .ops-retrying .ops-status { color: #096dd9; background: #e0f0ff; }

    .ops-label { font-weight: 700; color: #333; flex: 1; }
    .ops-time  { font-size: 0.7rem; color: #bbb; white-space: nowrap; }

    .ops-error {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #cf1322;
      font-family: monospace;
      word-break: break-all;
    }

    .ops-retry-btn {
      margin-top: 6px;
      background: #fff;
      border: 1.5px solid #ff4d4f;
      color: #cf1322;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 4px 12px;
      cursor: pointer;
      min-height: 36px;
      min-width: 44px;
      transition: background 0.12s;
    }
    .ops-retry-btn:hover:not(:disabled) { background: #fff1f0; }
    .ops-retry-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-send-report {
      margin-top: 12px;
      background: #fff;
      border: 2px solid #ff8c6b;
      color: #d94f2b;
      border-radius: 14px;
      font-size: 0.88rem;
      font-weight: 800;
      padding: 8px 18px;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: background 0.12s, transform 0.1s;
    }
    .btn-send-report:hover:not(:disabled) { background: #fff5f0; transform: translateY(-1px); }
    .btn-send-report:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STORAGE_KEY = 'pomodoro_sessions_v1';

    function getTodayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return 0;
        const { count, date } = JSON.parse(raw);
        return date === getTodayStr() ? (count | 0) : 0;
      } catch { return 0; }
    }

    function saveSessions(count) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ count, date: getTodayStr() }));
    }

    // ── Operation Log (NFR-001: 운영 추적성과 재시도 가능성) ──────────
    const OPS_LOG_KEY = 'pomodoro_ops_log_v1';

    function loadOpsLog() {
      try {
        const raw = localStorage.getItem(OPS_LOG_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    function saveOpsLog(log) {
      try { localStorage.setItem(OPS_LOG_KEY, JSON.stringify(log.slice(-30))); } catch {}
    }

    function addOpsEntry(type, label, details) {
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      const entry = { id, type, label, details, status: 'pending', error: null, timestamp: new Date().toISOString(), retries: 0 };
      const log = loadOpsLog();
      saveOpsLog([...log, entry]);
      return id;
    }

    function updateOpsEntry(id, patch) {
      const log = loadOpsLog();
      const idx = log.findIndex(e => e.id === id);
      if (idx >= 0) {
        log[idx] = { ...log[idx], ...patch, updatedAt: new Date().toISOString() };
        saveOpsLog(log);
      }
    }

    async function simulateSendEmail(sessions) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (Math.random() < 0.45) {
            reject(new Error('이메일 서버 응답 없음 (ETIMEDOUT)'));
          } else {
            resolve({ messageId: 'msg_' + Date.now() });
          }
        }, 1200);
      });
    }

    function fmtTimestamp(iso) {
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    const STATUS_LABEL = { pending: '처리 중', retrying: '재시도 중', failed: '실패', success: '성공' };

    // ── OpsLogPanel component ──────────────────────────────────────────
    function OpsLogPanel({ log, retrying, onRetry, onClear }) {
      const [expanded, setExpanded] = React.useState(true);
      const failCount = log.filter(e => e.status === 'failed').length;
      if (log.length === 0) return null;

      return (
        <div className="ops-section">
          <div
            className="ops-header"
            onClick={() => setExpanded(e => !e)}
            role="button"
            tabIndex={0}
            aria-expanded={expanded}
            onKeyDown={e => e.key === 'Enter' && setExpanded(x => !x)}
          >
            <span className="ops-title">
              운영 로그
              {failCount > 0 && <span className="ops-badge">{failCount}</span>}
            </span>
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
              <button
                className="ops-toggle-btn"
                onClick={ev => { ev.stopPropagation(); onClear(); }}
                aria-label="로그 지우기"
                title="로그 지우기"
              >🗑</button>
              <span className="ops-toggle-btn" aria-hidden="true">{expanded ? '▲' : '▼'}</span>
            </div>
          </div>
          {expanded && (
            <ul className="ops-list" role="list" aria-label="운영 작업 목록">
              {[...log].reverse().map(entry => (
                <li key={entry.id} className={`ops-entry ops-${entry.status}`}>
                  <div className="ops-entry-row">
                    <span className="ops-status">{STATUS_LABEL[entry.status] ?? entry.status}</span>
                    <span className="ops-label">{entry.label}</span>
                    <span className="ops-time">{fmtTimestamp(entry.timestamp)}</span>
                  </div>
                  {entry.error && <div className="ops-error">{entry.error}</div>}
                  {entry.status === 'failed' && (
                    <button
                      className="ops-retry-btn"
                      disabled={!!retrying[entry.id]}
                      onClick={() => onRetry(entry)}
                      aria-label={`재시도: ${entry.label}`}
                    >
                      재시도{entry.retries > 0 ? ` (${entry.retries}회 시도됨)` : ''}
                    </button>
                  )}
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    function playFocusEndSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t = ctx.currentTime;
        [[880, 0], [1100, 0.32]].forEach(([freq, delay]) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.28, t + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.28);
          osc.start(t + delay);
          osc.stop(t + delay + 0.28);
        });
        setTimeout(() => ctx.close(), 1600);
      } catch (_) {}
    }

    function playBreakEndSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const t = ctx.currentTime;
        [[523, 0], [659, 0.2], [784, 0.4]].forEach(([freq, delay]) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.22, t + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.2);
          osc.start(t + delay);
          osc.stop(t + delay + 0.2);
        });
        setTimeout(() => ctx.close(), 1600);
      } catch (_) {}
    }

    function fmt(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function TomatoCount({ count }) {
      if (count === 0) return <span className="tomatoes-empty">아직 없어요 😊</span>;
      if (count <= 12) return <span>{Array.from({ length: count }, () => '🍅').join(' ')}</span>;
      return <span>🍅×{count}</span>;
    }

    const RING_R = 100;
    const RING_C = 2 * Math.PI * RING_R;

    function App() {
      // 'setup' | 'focus' | 'focus_paused' | 'break' | 'break_paused' | 'waiting'
      const [phase, setPhase] = useState('setup');
      const [focusMin, setFocusMin] = useState(15);
      const [breakMin, setBreakMin] = useState(3);
      const [timeLeft, setTimeLeft] = useState(15 * 60);
      const [totalSec, setTotalSec] = useState(15 * 60);
      const [sessions, setSessions] = useState(() => loadSessions());
      const [notif, setNotif] = useState(null); // { text, isBreak }
      const [opsLog, setOpsLog] = useState(() => loadOpsLog());
      const [sending, setSending] = useState(false);
      const [retrying, setRetrying] = useState({});

      function refreshOpsLog() { setOpsLog(loadOpsLog()); }

      const notifTimer = useRef(null);
      // refs to avoid stale closures in timer effect
      const phaseRef = useRef(phase);
      const sessionsRef = useRef(sessions);
      const focusMinRef = useRef(focusMin);
      const breakMinRef = useRef(breakMin);
      phaseRef.current = phase;
      sessionsRef.current = sessions;
      focusMinRef.current = focusMin;
      breakMinRef.current = breakMin;

      const running = phase === 'focus' || phase === 'break';

      // Countdown tick
      useEffect(() => {
        if (!running || timeLeft <= 0) return;
        const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
        return () => clearTimeout(id);
      }, [running, timeLeft]);

      // Timer completion
      useEffect(() => {
        if (!running || timeLeft !== 0) return;
        const currentPhase = phaseRef.current;

        if (currentPhase === 'focus') {
          playFocusEndSound();
          const newCount = sessionsRef.current + 1;
          setSessions(newCount);
          saveSessions(newCount);
          showNotif('휴식 시간! 🎉', false);
          const bSec = breakMinRef.current * 60;
          setTotalSec(bSec);
          setTimeLeft(bSec);
          setPhase('break');
        } else if (currentPhase === 'break') {
          playBreakEndSound();
          showNotif('집중 시작! 📚', true);
          const fSec = focusMinRef.current * 60;
          setTotalSec(fSec);
          setTimeLeft(fSec);
          setPhase('waiting');
        }
      }, [timeLeft, running]); // eslint-disable-line

      // Midnight reset check
      useEffect(() => {
        const id = setInterval(() => {
          setSessions(loadSessions());
        }, 60_000);
        return () => clearInterval(id);
      }, []);

      // Body background
      useEffect(() => {
        const isBreak = phase === 'break' || phase === 'break_paused';
        document.body.classList.toggle('break-bg', isBreak);
      }, [phase]);

      function showNotif(text, isBreak) {
        setNotif({ text, isBreak });
        clearTimeout(notifTimer.current);
        notifTimer.current = setTimeout(() => setNotif(null), 1500);
      }

      async function handleSendReport() {
        if (sending) return;
        setSending(true);
        const label = `일일 보고서 전송 (세션 ${sessions}회)`;
        const id = addOpsEntry('email', label, { sessions, date: getTodayStr() });
        refreshOpsLog();
        try {
          await simulateSendEmail(sessions);
          updateOpsEntry(id, { status: 'success' });
        } catch (err) {
          updateOpsEntry(id, { status: 'failed', error: err.message });
        } finally {
          refreshOpsLog();
          setSending(false);
        }
      }

      async function handleRetry(entry) {
        setRetrying(r => ({ ...r, [entry.id]: true }));
        updateOpsEntry(entry.id, { status: 'retrying', retries: (entry.retries || 0) + 1 });
        refreshOpsLog();
        try {
          await simulateSendEmail(sessions);
          updateOpsEntry(entry.id, { status: 'success', error: null });
        } catch (err) {
          updateOpsEntry(entry.id, { status: 'failed', error: err.message });
        } finally {
          refreshOpsLog();
          setRetrying(r => { const n = { ...r }; delete n[entry.id]; return n; });
        }
      }

      function handleClearOpsLog() {
        try { localStorage.removeItem(OPS_LOG_KEY); } catch {}
        setOpsLog([]);
      }

      function handleStart() {
        const fSec = focusMin * 60;
        setTotalSec(fSec);
        setTimeLeft(fSec);
        setPhase('focus');
      }

      function handlePause() {
        setPhase(p => p === 'focus' ? 'focus_paused' : 'break_paused');
      }

      function handleResume() {
        setPhase(p => p === 'focus_paused' ? 'focus' : 'break');
      }

      function handleReset() {
        clearTimeout(notifTimer.current);
        setNotif(null);
        const fSec = focusMin * 60;
        setTotalSec(fSec);
        setTimeLeft(fSec);
        setPhase('setup');
      }

      const isBreakPhase = phase === 'break' || phase === 'break_paused';
      const isFocusPhase = phase === 'focus' || phase === 'focus_paused';
      const isRunningPhase = isFocusPhase || isBreakPhase;

      const progress = totalSec > 0 ? timeLeft / totalSec : 1;
      const dashOffset = RING_C * (1 - progress);

      return (
        <div className="app">
          <div className="app-title">🍅 뽀모도로 타이머</div>

          {/* ── Setup / Waiting ── */}
          {(phase === 'setup' || phase === 'waiting') && (
            <>
              <div className="settings">
                <div className="setting-row">
                  <span className="setting-label">집중 시간</span>
                  <button
                    className="stepper-btn"
                    onClick={() => setFocusMin(m => Math.max(5, m - 1))}
                    disabled={focusMin <= 5}
                    aria-label="집중 시간 줄이기"
                  >−</button>
                  <span className="setting-value">{focusMin}분</span>
                  <button
                    className="stepper-btn"
                    onClick={() => setFocusMin(m => Math.min(30, m + 1))}
                    disabled={focusMin >= 30}
                    aria-label="집중 시간 늘리기"
                  >+</button>
                </div>
                <div className="setting-row">
                  <span className="setting-label">휴식 시간</span>
                  <button
                    className="stepper-btn"
                    onClick={() => setBreakMin(m => Math.max(1, m - 1))}
                    disabled={breakMin <= 1}
                    aria-label="휴식 시간 줄이기"
                  >−</button>
                  <span className="setting-value">{breakMin}분</span>
                  <button
                    className="stepper-btn"
                    onClick={() => setBreakMin(m => Math.min(10, m + 1))}
                    disabled={breakMin >= 10}
                    aria-label="휴식 시간 늘리기"
                  >+</button>
                </div>
              </div>

              {phase === 'waiting' && (
                <div className="timer-preview">{fmt(focusMin * 60)}</div>
              )}

              <button className="btn btn-start" onClick={handleStart}>
                {phase === 'waiting' ? '다시 시작! 🚀' : '시작! 🚀'}
              </button>
            </>
          )}

          {/* ── Focus / Break running or paused ── */}
          {isRunningPhase && (
            <>
              <div className={`mode-label${isBreakPhase ? ' break-mode' : ''}`}>
                {isBreakPhase ? '휴식 시간! 🎉' : '집중 시간! 📚'}
              </div>

              <div className="timer-ring-wrap">
                <svg
                  width="240" height="240"
                  viewBox="0 0 240 240"
                  className="ring-svg"
                  aria-hidden="true"
                >
                  <circle className="ring-bg" cx="120" cy="120" r={RING_R} />
                  <circle
                    className={`ring-track ${isBreakPhase ? 'ring-break' : 'ring-focus'}`}
                    cx="120" cy="120" r={RING_R}
                    strokeDasharray={RING_C}
                    strokeDashoffset={dashOffset}
                  />
                </svg>
                <div
                  className="timer-display"
                  role="timer"
                  aria-live="polite"
                  aria-atomic="true"
                  aria-label={`남은 시간 ${fmt(timeLeft)}`}
                >
                  {fmt(timeLeft)}
                </div>
              </div>

              <div className="controls">
                {running ? (
                  <button className="btn btn-pause" onClick={handlePause}>일시정지</button>
                ) : (
                  <button className="btn btn-resume" onClick={handleResume}>재개</button>
                )}
                <button className="btn btn-reset" onClick={handleReset}>초기화</button>
              </div>
            </>
          )}

          {/* ── Session count ── */}
          <div className="sessions">
            <div className="sessions-label">오늘 완료한 세션</div>
            <div className="tomatoes">
              <TomatoCount count={sessions} />
            </div>
            {sessions > 0 && (
              <button
                className="btn-send-report"
                onClick={handleSendReport}
                disabled={sending}
                aria-label="부모에게 일일 보고서 이메일 전송"
              >
                {sending ? '전송 중…' : '📧 오늘 보고서 전송'}
              </button>
            )}
          </div>

          {/* ── Ops log (NFR-001) ── */}
          <OpsLogPanel
            log={opsLog}
            retrying={retrying}
            onRetry={handleRetry}
            onClear={handleClearOpsLog}
          />

          {/* ── Notification overlay ── */}
          {notif && (
            <div className="notif-overlay">
              <div className={`notif-box${notif.isBreak ? ' break-notif' : ''}`}>
                {notif.text}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
